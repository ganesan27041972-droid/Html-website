<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHRONO</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0d1017;
    --panel: #111520;
    --border: #1e2535;
    --accent: #00e5ff;
    --accent2: #ff3c5c;
    --accent3: #ffe033;
    --text: #e8edf5;
    --muted: #4a5568;
    --dim: #2a3345;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,229,255,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(255,60,92,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,229,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 6px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.4);
  }

  .logo span { color: var(--text); }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .live-dot::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  nav {
    display: flex;
    gap: 4px;
    padding: 16px 40px;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }

  .tab {
    padding: 8px 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .tab:hover { color: var(--text); border-color: var(--dim); }

  .tab.active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(0,229,255,0.05);
    box-shadow: 0 0 16px rgba(0,229,255,0.1);
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 60px 40px;
    position: relative;
    z-index: 10;
  }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── CLOCK ── */
  .clock-wrap {
    text-align: center;
    padding: 40px 0;
  }

  .clock-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(72px, 14vw, 140px);
    color: var(--text);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 12px;
    text-shadow: 0 0 40px rgba(0,229,255,0.15);
    position: relative;
  }

  .clock-display .colon {
    animation: blink 1s step-end infinite;
    color: var(--accent);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .clock-sub {
    display: flex;
    justify-content: center;
    gap: 40px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
  }

  .clock-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 4px;
    color: var(--dim);
    margin-top: 24px;
  }

  .clock-analog {
    margin: 48px auto 0;
    width: 200px;
    height: 200px;
    position: relative;
  }

  .clock-analog svg { width: 100%; height: 100%; }

  /* ── SHARED DISPLAY ── */
  .big-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(64px, 12vw, 120px);
    text-align: center;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 48px;
    transition: color 0.3s;
  }

  .big-time.running { color: var(--accent); text-shadow: 0 0 30px rgba(0,229,255,0.3); }
  .big-time.paused  { color: var(--accent3); text-shadow: 0 0 30px rgba(255,224,51,0.2); }
  .big-time.done    { color: var(--accent2); text-shadow: 0 0 30px rgba(255,60,92,0.4); animation: flashRed 0.5s ease infinite; }

  @keyframes flashRed {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .btn {
    padding: 14px 32px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover { color: var(--text); border-color: var(--dim); }

  .btn.primary {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 20px rgba(0,229,255,0.1);
  }
  .btn.primary:hover { background: rgba(0,229,255,0.1); box-shadow: 0 0 30px rgba(0,229,255,0.2); }

  .btn.danger {
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 20px rgba(255,60,92,0.1);
  }
  .btn.danger:hover { background: rgba(255,60,92,0.08); }

  .btn.warn {
    border-color: var(--accent3);
    color: var(--accent3);
  }
  .btn.warn:hover { background: rgba(255,224,51,0.08); }

  /* ── TIMER INPUT ── */
  .timer-inputs {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 48px;
  }

  .time-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .time-unit label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
  }

  .time-unit input {
    width: 88px;
    height: 88px;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 36px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .time-unit input:focus { border-color: var(--accent); box-shadow: 0 0 16px rgba(0,229,255,0.1); }
  .time-unit input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .time-sep {
    font-family: 'Share Tech Mono', monospace;
    font-size: 40px;
    color: var(--dim);
    margin-top: 18px;
  }

  /* ── PRESETS ── */
  .presets {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .preset-btn {
    padding: 6px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    border: 1px solid var(--dim);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── ALARM ── */
  .alarm-input-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 40px;
  }

  .alarm-time-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 56px;
    text-align: center;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 20px 32px;
    outline: none;
    width: 300px;
    letter-spacing: 4px;
  }

  .alarm-time-input:focus { border-color: var(--accent); }
  .alarm-time-input::-webkit-calendar-picker-indicator { filter: invert(1) brightness(0.4); }

  .alarm-list {
    max-width: 500px;
    margin: 0 auto;
  }

  .alarm-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border: 1px solid var(--border);
    margin-bottom: 8px;
    background: var(--panel);
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .alarm-time-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: var(--text);
  }

  .alarm-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: #22c55e;
  }

  .alarm-status.fired { color: var(--accent2); }

  .alarm-delete {
    padding: 6px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    border: 1px solid var(--dim);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .alarm-delete:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── STOPWATCH LAPS ── */
  .laps-wrap {
    max-height: 260px;
    overflow-y: auto;
    border: 1px solid var(--border);
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
  }

  .lap-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    animation: slideIn 0.15s ease;
  }

  .lap-row:last-child { border-bottom: none; }
  .lap-row .lap-n { color: var(--muted); font-size: 11px; letter-spacing: 2px; }
  .lap-row .lap-t { color: var(--text); }
  .lap-row .lap-d { color: var(--muted); font-size: 13px; }
  .lap-row.best .lap-t { color: #22c55e; }
  .lap-row.worst .lap-t { color: var(--accent2); }

  /* ── SECTION LABEL ── */
  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-label::before, .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── PROGRESS BAR ── */
  .progress-bar {
    height: 2px;
    background: var(--border);
    margin-bottom: 48px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), rgba(0,229,255,0.3));
    transition: width 0.1s linear;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: -3px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  /* notification */
  .notif {
    position: fixed;
    top: 24px;
    right: 24px;
    background: var(--panel);
    border: 1px solid var(--accent2);
    padding: 16px 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--accent2);
    box-shadow: 0 0 30px rgba(255,60,92,0.2);
    z-index: 1000;
    animation: slideNotif 0.3s ease;
    max-width: 300px;
  }

  @keyframes slideNotif {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .notif.hide { animation: hideNotif 0.3s ease forwards; }
  @keyframes hideNotif {
    to { opacity: 0; transform: translateX(20px); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">CHRO<span>NO</span></div>
  <div class="live-dot" id="headerTime">00:00:00</div>
</header>

<nav>
  <button class="tab active" onclick="switchTab('clock')">CLOCK</button>
  <button class="tab" onclick="switchTab('timer')">TIMER</button>
  <button class="tab" onclick="switchTab('alarm')">ALARM</button>
  <button class="tab" onclick="switchTab('stopwatch')">STOPWATCH</button>
</nav>

<main>

  <!-- CLOCK -->
  <div id="panel-clock" class="panel active">
    <div class="clock-wrap">
      <div class="clock-display" id="clockTime">
        <span id="ch">00</span><span class="colon">:</span><span id="cm">00</span><span class="colon">:</span><span id="cs">00</span>
      </div>
      <div class="clock-sub">
        <span id="clockAmPm">AM</span>
        <span id="clockTZ">UTC</span>
      </div>
      <div class="clock-date" id="clockDate">MONDAY — JAN 01</div>
      <div class="clock-analog">
        <svg viewBox="0 0 200 200" id="analogClock">
          <!-- Face -->
          <circle cx="100" cy="100" r="96" fill="none" stroke="#1e2535" stroke-width="1"/>
          <circle cx="100" cy="100" r="88" fill="#0d1017"/>
          <!-- Tick marks -->
          <g id="ticks"></g>
          <!-- Hands -->
          <line id="hourHand"   x1="100" y1="100" x2="100" y2="40"  stroke="#e8edf5" stroke-width="3"  stroke-linecap="round"/>
          <line id="minuteHand" x1="100" y1="100" x2="100" y2="24"  stroke="#e8edf5" stroke-width="2"  stroke-linecap="round"/>
          <line id="secondHand" x1="100" y1="110" x2="100" y2="16"  stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="100" cy="100" r="4" fill="#00e5ff"/>
          <circle cx="100" cy="100" r="2" fill="#0d1017"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- TIMER -->
  <div id="panel-timer" class="panel">
    <div class="section-label">SET DURATION</div>
    <div class="timer-inputs" id="timerInputs">
      <div class="time-unit">
        <label>HH</label>
        <input type="number" id="timerH" value="00" min="0" max="99" oninput="padInput(this)">
      </div>
      <div class="time-sep">:</div>
      <div class="time-unit">
        <label>MM</label>
        <input type="number" id="timerM" value="05" min="0" max="59" oninput="padInput(this)">
      </div>
      <div class="time-sep">:</div>
      <div class="time-unit">
        <label>SS</label>
        <input type="number" id="timerS" value="00" min="0" max="59" oninput="padInput(this)">
      </div>
    </div>
    <div class="presets">
      <button class="preset-btn" onclick="setTimerPreset(1,0,0)">1H</button>
      <button class="preset-btn" onclick="setTimerPreset(0,30,0)">30M</button>
      <button class="preset-btn" onclick="setTimerPreset(0,15,0)">15M</button>
      <button class="preset-btn" onclick="setTimerPreset(0,10,0)">10M</button>
      <button class="preset-btn" onclick="setTimerPreset(0,5,0)">5M</button>
      <button class="preset-btn" onclick="setTimerPreset(0,3,0)">3M</button>
      <button class="preset-btn" onclick="setTimerPreset(0,1,0)">1M</button>
      <button class="preset-btn" onclick="setTimerPreset(0,0,30)">30S</button>
    </div>
    <div class="big-time" id="timerDisplay">00:05:00</div>
    <div class="progress-bar"><div class="progress-fill" id="timerProgress" style="width:100%"></div></div>
    <div class="controls">
      <button class="btn primary" id="timerStartBtn" onclick="timerStart()">START</button>
      <button class="btn warn"    id="timerPauseBtn" onclick="timerPause()" style="display:none">PAUSE</button>
      <button class="btn"         id="timerResumeBtn" onclick="timerResume()" style="display:none">RESUME</button>
      <button class="btn danger"  id="timerResetBtn" onclick="timerReset()" style="display:none">RESET</button>
    </div>
  </div>

  <!-- ALARM -->
  <div id="panel-alarm" class="panel">
    <div class="section-label">SET ALARM TIME</div>
    <div class="alarm-input-wrap">
      <input type="time" class="alarm-time-input" id="alarmTimeInput" value="07:00">
    </div>
    <div class="controls" style="margin-bottom:48px">
      <button class="btn primary" onclick="addAlarm()">ADD ALARM</button>
    </div>
    <div class="section-label">ACTIVE ALARMS</div>
    <div class="alarm-list" id="alarmList"></div>
    <div id="alarmEmpty" style="text-align:center;font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;color:var(--muted);padding:32px 0;">NO ALARMS SET</div>
  </div>

  <!-- STOPWATCH -->
  <div id="panel-stopwatch" class="panel">
    <div class="big-time" id="swDisplay">00:00:00.00</div>
    <div class="controls" style="margin-bottom:32px">
      <button class="btn primary" id="swStartBtn"  onclick="swStart()">START</button>
      <button class="btn warn"    id="swPauseBtn"  onclick="swPause()"  style="display:none">PAUSE</button>
      <button class="btn"         id="swResumeBtn" onclick="swResume()" style="display:none">RESUME</button>
      <button class="btn"         id="swLapBtn"    onclick="swLap()"   style="display:none">LAP</button>
      <button class="btn danger"  id="swResetBtn"  onclick="swReset()"  style="display:none">RESET</button>
    </div>
    <div class="laps-wrap" id="lapsWrap" style="display:none">
      <div id="lapsList"></div>
    </div>
  </div>

</main>

<script>
// ─── UTILITIES ───────────────────────────────────────────────
const $ = id => document.getElementById(id);
const pad = n => String(Math.floor(n)).padStart(2,'0');

function showNotif(msg) {
  const n = document.createElement('div');
  n.className = 'notif';
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => { n.className = 'notif hide'; setTimeout(() => n.remove(), 300); }, 3500);
}

function beep(freq=880, dur=400, vol=0.4, type='sine') {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur/1000);
    osc.start(); osc.stop(ctx.currentTime + dur/1000);
  } catch(e) {}
}

function alarmSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  [0, 0.18, 0.36, 0.54].forEach((t, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.value = i % 2 === 0 ? 880 : 1100;
    gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.15);
    osc.start(ctx.currentTime + t);
    osc.stop(ctx.currentTime + t + 0.15);
  });
}

// ─── TAB SWITCHING ────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const tabs = ['clock','timer','alarm','stopwatch'];
  document.querySelectorAll('.tab')[tabs.indexOf(tab)].classList.add('active');
  $('panel-'+tab).classList.add('active');
}

// ─── CLOCK ───────────────────────────────────────────────────
const DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

// Build tick marks
(function buildTicks() {
  const g = $('ticks');
  for(let i=0; i<60; i++) {
    const a = (i/60)*360 - 90;
    const r = a * Math.PI/180;
    const isMaj = i % 5 === 0;
    const r1 = isMaj ? 80 : 84, r2 = 88;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', 100 + r1*Math.cos(r));
    line.setAttribute('y1', 100 + r1*Math.sin(r));
    line.setAttribute('x2', 100 + r2*Math.cos(r));
    line.setAttribute('y2', 100 + r2*Math.sin(r));
    line.setAttribute('stroke', isMaj ? '#2a3345' : '#1e2535');
    line.setAttribute('stroke-width', isMaj ? '2' : '1');
    g.appendChild(line);
  }
})();

function rotateHand(el, deg) {
  el.setAttribute('transform', `rotate(${deg}, 100, 100)`);
}

function updateClock() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const ms = now.getMilliseconds();

  $('ch').textContent = pad(h % 12 || 12);
  $('cm').textContent = pad(m);
  $('cs').textContent = pad(s);
  $('clockAmPm').textContent = h < 12 ? 'AM' : 'PM';
  $('clockTZ').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone || 'LOCAL';
  $('clockDate').textContent = DAYS[now.getDay()] + ' — ' + MONTHS[now.getMonth()] + ' ' + String(now.getDate()).padStart(2,'0');

  // Analog
  const secDeg   = (s + ms/1000) * 6;
  const minDeg   = (m + s/60) * 6;
  const hourDeg  = ((h % 12) + m/60) * 30;
  rotateHand($('secondHand'), secDeg);
  rotateHand($('minuteHand'), minDeg);
  rotateHand($('hourHand'),   hourDeg);

  // Header
  $('headerTime').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
}
setInterval(updateClock, 100);
updateClock();

// ─── TIMER ────────────────────────────────────────────────────
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;

function padInput(el) {
  if(el.value > el.max) el.value = el.max;
}

function setTimerPreset(h,m,s) {
  $('timerH').value = pad(h);
  $('timerM').value = pad(m);
  $('timerS').value = pad(s);
  timerDisplayUpdate(h*3600+m*60+s);
  $('timerProgress').style.width = '100%';
}

function timerDisplayUpdate(secs) {
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = secs % 60;
  $('timerDisplay').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
}

$('timerH').addEventListener('change', refreshTimerDisplay);
$('timerM').addEventListener('change', refreshTimerDisplay);
$('timerS').addEventListener('change', refreshTimerDisplay);

function refreshTimerDisplay() {
  const total = parseInt($('timerH').value||0)*3600 + parseInt($('timerM').value||0)*60 + parseInt($('timerS').value||0);
  timerDisplayUpdate(total);
  $('timerProgress').style.width = '100%';
}

function timerStart() {
  const h = parseInt($('timerH').value||0);
  const m = parseInt($('timerM').value||0);
  const s = parseInt($('timerS').value||0);
  timerTotal = h*3600 + m*60 + s;
  if(timerTotal <= 0) { showNotif('SET A DURATION FIRST'); return; }
  timerRemaining = timerTotal;
  $('timerInputs').style.opacity = '0.3';
  $('timerInputs').style.pointerEvents = 'none';
  $('timerStartBtn').style.display = 'none';
  $('timerPauseBtn').style.display = '';
  $('timerResetBtn').style.display = '';
  $('timerDisplay').className = 'big-time running';
  beep(660, 80);
  timerInterval = setInterval(() => {
    timerRemaining--;
    timerDisplayUpdate(timerRemaining);
    $('timerProgress').style.width = (timerRemaining/timerTotal*100) + '%';
    if(timerRemaining <= 0) {
      clearInterval(timerInterval);
      $('timerDisplay').className = 'big-time done';
      $('timerDisplay').textContent = '00:00:00';
      $('timerPauseBtn').style.display = 'none';
      $('timerProgress').style.width = '0%';
      showNotif('⏱ TIMER COMPLETE!');
      alarmSound(); setTimeout(alarmSound, 500); setTimeout(alarmSound, 1000);
    }
  }, 1000);
}

function timerPause() {
  clearInterval(timerInterval);
  $('timerPauseBtn').style.display = 'none';
  $('timerResumeBtn').style.display = '';
  $('timerDisplay').className = 'big-time paused';
}

function timerResume() {
  $('timerResumeBtn').style.display = 'none';
  $('timerPauseBtn').style.display = '';
  $('timerDisplay').className = 'big-time running';
  timerInterval = setInterval(() => {
    timerRemaining--;
    timerDisplayUpdate(timerRemaining);
    $('timerProgress').style.width = (timerRemaining/timerTotal*100) + '%';
    if(timerRemaining <= 0) {
      clearInterval(timerInterval);
      $('timerDisplay').className = 'big-time done';
      $('timerPauseBtn').style.display = 'none';
      showNotif('⏱ TIMER COMPLETE!');
      alarmSound(); setTimeout(alarmSound, 500); setTimeout(alarmSound, 1000);
    }
  }, 1000);
}

function timerReset() {
  clearInterval(timerInterval);
  timerInterval = null;
  $('timerInputs').style.opacity = '';
  $('timerInputs').style.pointerEvents = '';
  $('timerStartBtn').style.display = '';
  $('timerPauseBtn').style.display = 'none';
  $('timerResumeBtn').style.display = 'none';
  $('timerResetBtn').style.display = 'none';
  $('timerDisplay').className = 'big-time';
  $('timerProgress').style.width = '100%';
  timerDisplayUpdate(parseInt($('timerH').value||0)*3600 + parseInt($('timerM').value||0)*60 + parseInt($('timerS').value||0));
}

// ─── ALARM ────────────────────────────────────────────────────
let alarms = [];
let alarmCheckInterval = null;

function addAlarm() {
  const val = $('alarmTimeInput').value;
  if(!val) { showNotif('SELECT A TIME'); return; }
  const [h, m] = val.split(':').map(Number);
  const id = Date.now();
  alarms.push({ id, h, m, fired: false });
  beep(880, 80);
  renderAlarms();
  if(!alarmCheckInterval) alarmCheckInterval = setInterval(checkAlarms, 10000);
  checkAlarms(); // immediate check
}

function deleteAlarm(id) {
  alarms = alarms.filter(a => a.id !== id);
  renderAlarms();
  if(!alarms.length && alarmCheckInterval) { clearInterval(alarmCheckInterval); alarmCheckInterval = null; }
}

function renderAlarms() {
  const list = $('alarmList');
  const empty = $('alarmEmpty');
  list.innerHTML = '';
  if(!alarms.length) { empty.style.display = ''; return; }
  empty.style.display = 'none';
  [...alarms].reverse().forEach(a => {
    const div = document.createElement('div');
    div.className = 'alarm-item';
    const label = `${pad(a.h)}:${pad(a.m)}`;
    div.innerHTML = `
      <span class="alarm-time-label">${label}</span>
      <span class="alarm-status${a.fired?' fired':''}">
        ${a.fired ? '✓ FIRED' : '● ARMED'}
      </span>
      <button class="alarm-delete" onclick="deleteAlarm(${a.id})">✕ DEL</button>
    `;
    list.appendChild(div);
  });
}

function checkAlarms() {
  const now = new Date();
  alarms.forEach(a => {
    if(!a.fired && now.getHours()===a.h && now.getMinutes()===a.m) {
      a.fired = true;
      showNotif(`🔔 ALARM — ${pad(a.h)}:${pad(a.m)}`);
      alarmSound(); setTimeout(alarmSound,500); setTimeout(alarmSound,1000); setTimeout(alarmSound,1500);
      renderAlarms();
      // Reset next day
      setTimeout(() => { a.fired = false; renderAlarms(); }, 61000);
    }
  });
}

setInterval(checkAlarms, 5000);

// ─── STOPWATCH ────────────────────────────────────────────────
let swStart = 0, swElapsed = 0, swInterval = null, swRunning = false;
let swLaps = [];

function fmtSW(ms) {
  const total = Math.floor(ms);
  const h = Math.floor(total/3600000);
  const m = Math.floor((total%3600000)/60000);
  const s = Math.floor((total%60000)/1000);
  const cs = Math.floor((total%1000)/10);
  return `${pad(h)}:${pad(m)}:${pad(s)}.${pad(cs)}`;
}

function swStart_() {
  swStart = Date.now() - swElapsed;
  swInterval = setInterval(() => {
    swElapsed = Date.now() - swStart;
    $('swDisplay').textContent = fmtSW(swElapsed);
  }, 33);
  swRunning = true;
  $('swStartBtn').style.display = 'none';
  $('swPauseBtn').style.display = '';
  $('swLapBtn').style.display = '';
  $('swResetBtn').style.display = '';
  $('swDisplay').className = 'big-time running';
}

function swPause() {
  clearInterval(swInterval);
  swRunning = false;
  $('swPauseBtn').style.display = 'none';
  $('swResumeBtn').style.display = '';
  $('swLapBtn').style.display = 'none';
  $('swDisplay').className = 'big-time paused';
  beep(440, 60);
}

function swResume() {
  swStart = Date.now() - swElapsed;
  swInterval = setInterval(() => {
    swElapsed = Date.now() - swStart;
    $('swDisplay').textContent = fmtSW(swElapsed);
  }, 33);
  swRunning = true;
  $('swResumeBtn').style.display = 'none';
  $('swPauseBtn').style.display = '';
  $('swLapBtn').style.display = '';
  $('swDisplay').className = 'big-time running';
}

function swLap() {
  const prev = swLaps.length ? swLaps[swLaps.length-1].total : 0;
  const lap = { n: swLaps.length+1, total: swElapsed, split: swElapsed - prev };
  swLaps.push(lap);
  beep(660, 50);
  renderLaps();
  $('lapsWrap').style.display = '';
}

function swReset() {
  clearInterval(swInterval);
  swElapsed = 0; swRunning = false; swLaps = [];
  $('swDisplay').textContent = '00:00:00.00';
  $('swDisplay').className = 'big-time';
  $('swStartBtn').style.display = '';
  $('swPauseBtn').style.display = 'none';
  $('swResumeBtn').style.display = 'none';
  $('swLapBtn').style.display = 'none';
  $('swResetBtn').style.display = 'none';
  $('lapsWrap').style.display = 'none';
  $('lapsList').innerHTML = '';
}

// Expose as proper names
window.swStart = swStart_;
window.swPause = swPause;
window.swResume = swResume;
window.swLap = swLap;
window.swReset = swReset;

function renderLaps() {
  const list = $('lapsList');
  const splits = swLaps.map(l => l.split);
  const best = Math.min(...splits), worst = Math.max(...splits);
  list.innerHTML = '';
  [...swLaps].reverse().forEach(l => {
    const row = document.createElement('div');
    let cls = 'lap-row';
    if(swLaps.length > 1) {
      if(l.split === best)  cls += ' best';
      if(l.split === worst) cls += ' worst';
    }
    row.className = cls;
    row.innerHTML = `
      <span class="lap-n">LAP ${String(l.n).padStart(2,'0')}</span>
      <span class="lap-t">${fmtSW(l.total)}</span>
      <span class="lap-d">+${fmtSW(l.split)}</span>
    `;
    list.appendChild(row);
  });
  $('lapsWrap').scrollTop = 0;
}

// init timer display
timerDisplayUpdate(300);
</script>
</body>
