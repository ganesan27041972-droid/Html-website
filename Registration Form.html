<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration Form</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --paper: #ffffff;
      --ink: #172033;
      --muted: #5e6a7d;
      --primary: #0b5cad;
      --primary-dark: #083f78;
      --accent: #e06f2f;
      --line: #d9e2ef;
      --shadow: 0 24px 60px rgba(28, 45, 74, 0.16);
      --radius: 18px;
      --font-main: "Segoe UI", "Inter", "Roboto", "Helvetica Neue", Arial, sans-serif;
      --font-display: "Trebuchet MS", "Segoe UI", "Inter", Arial, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 16px;
      font-family: var(--font-main);
      background:
        linear-gradient(135deg, rgba(11, 92, 173, 0.12), transparent 35%),
        linear-gradient(315deg, rgba(224, 111, 47, 0.12), transparent 36%),
        var(--bg);
      color: var(--ink);
    }

    .form-page {
      width: min(100%, 760px);
    }

    .form-card {
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .form-header {
      padding: 34px 28px 30px;
      background: linear-gradient(120deg, var(--primary-dark), var(--primary));
      color: #ffffff;
      text-align: center;
      border-bottom: 5px solid var(--accent);
    }

    .form-header h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.1rem);
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: 0;
      text-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
    }

    .form-header p {
      margin: 12px auto 0;
      max-width: 520px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 1rem;
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 20px;
      padding: 30px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--primary-dark);
      font-weight: 800;
      font-size: 0.98rem;
    }

    input,
    select {
      width: 100%;
      min-height: 50px;
      padding: 0 15px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f8fbff;
      color: var(--ink);
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(11, 92, 173, 0.12);
    }

    select {
      cursor: pointer;
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
      padding-top: 8px;
    }

    .btn {
      min-height: 46px;
      padding: 0 22px;
      border: 0;
      border-radius: 999px;
      color: #ffffff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover,
    .btn:focus {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(28, 45, 74, 0.18);
    }

    .btn-submit {
      background: linear-gradient(120deg, var(--primary), var(--primary-dark));
    }

    .btn-reset {
      background: linear-gradient(120deg, var(--accent), #c24d16);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      margin-top: 18px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      color: var(--primary-dark);
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(28, 45, 74, 0.08);
    }

    .back-link:hover,
    .back-link:focus {
      color: var(--accent);
    }

    @media (max-width: 560px) {
      body {
        padding: 18px 12px;
      }

      .form-header {
        padding: 28px 20px 24px;
      }

      form {
        padding: 22px;
      }

      .form-actions {
        justify-content: stretch;
      }

      .btn {
        flex: 1 1 140px;
      }
    }
  </style>
</head>

<body>
  <main class="form-page">
    <section class="form-card">
      <div class="form-header">
        <h1>Student Registration Form</h1>
        <p>Enter your details below and choose the course department you want to learn.</p>
      </div>

      <form>
        <div class="field">
          <label for="name">Name</label>
          <input id="name" type="text" name="name" placeholder="Enter your full name">
        </div>

        <div class="field">
          <label for="age">Age</label>
          <input id="age" type="number" name="age" placeholder="Enter your age">
        </div>

        <div class="field">
          <label for="address">Address</label>
          <input id="address" type="text" name="address" placeholder="Enter your address">
        </div>

        <div class="field">
          <label for="department">Department</label>
          <select id="department" name="department">
            <option value="">Select Department</option>
            <option>Python Programming</option>
            <option>HTML and CSS</option>
            <option>GitHub</option>
            <option>SQL</option>
          </select>
        </div>

        <div class="form-actions">
          <input class="btn btn-reset" type="reset" value="Reset">
          <input class="btn btn-submit" type="submit" value="Submit">
        </div>
      </form>
    </section>

    <a class="back-link" href="My Website.html">Back to website</a>
  </main>
</body>

</html>
